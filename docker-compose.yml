version: "3.8"

services:
  web-shop-backend:
    build: ./backend/web-shop-backend
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - PRODUCT_SERVICE_URL=http://product-service:3001
      - CART_SERVICE_URL=http://cart-service:3002
      - ORDER_SERVICE_URL=http://order-service:3003
      - MEDIA_SERVICE_URL=http://media-service:3004
      - AI_SERVICE_URL=http://ai-service:3006
      - ROADMAP_SERVICE_URL=http://roadmap-service:3007
      - MEDIA_PUBLIC_URL=http://localhost:9000/aether-images
    depends_on:
      - product-service
      - cart-service
      - order-service
      - media-service
      - ai-service
      - roadmap-service

  product-service:
    build: ./services/product-service
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=development
      - PORT=3001
      - DB_HOST=mysql
      - DB_USER=root
      - DB_PASSWORD=root_pass
      - DB_NAME=aether_motors
    depends_on:
      - mysql

  cart-service:
    build: ./services/cart-service
    ports:
      - "3002:3002"
    environment:
      - NODE_ENV=development
      - PORT=3002
      - REDIS_URL=redis://redis:6379
      - REDIS_KEY_PREFIX=aether:cart
      - REDIS_TTL_SECONDS=86400
      - PRODUCT_SERVICE_URL=http://product-service:3001
      - USE_MOCK_PRODUCTS=false
    depends_on:
      redis:
        condition: service_healthy
      product-service:
        condition: service_started

  order-service:
    build: ./services/order-service
    ports:
      - "3003:3003"
    environment:
      - NODE_ENV=development
      - PORT=3003
      - CART_SERVICE_URL=http://cart-service:3002
      - DB_HOST=mysql-orders
      - DB_USER=root
      - DB_PASSWORD=root_pass
      - DB_NAME=aether_orders
    depends_on:
      cart-service:
        condition: service_started
      mysql-orders:
        condition: service_healthy

  media-service:
    build: ./services/media-service
    ports:
      - "3004:3004"
    environment:
      - NODE_ENV=development
      - PORT=3004
      - MINIO_ENDPOINT=minio
      - MINIO_PORT=9000
      - MINIO_ACCESS_KEY=aether_admin
      - MINIO_SECRET_KEY=aether_secret_change_me
      - MINIO_BUCKET=aether-images
      - MINIO_PUBLIC_URL=http://localhost:9000
    depends_on:
      - minio

  ai-service:
    build: ./services/ai-service
    ports:
      - "3006:3006"
    environment:
      - PRODUCT_SERVICE_URL=http://product-service:3001
      - NODE_ENV=development
      - PORT=3006
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    depends_on:
      - product-service

  roadmap-service:
    build: ./services/roadmap-service
    ports:
      - "3007:3007"
    environment:
      - NODE_ENV=development
      - PORT=3007

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  minio:
    image: minio/minio:RELEASE.2024-10-13T13-34-11Z
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"   # S3 API + public object access
      - "9001:9001"   # MinIO web console
    environment:
      - MINIO_ROOT_USER=aether_admin
      - MINIO_ROOT_PASSWORD=aether_secret_change_me
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 3s
      retries: 5

  minio-init:
    # One-shot container: creates the public bucket and seeds the demo images.
    # Prefers locally bundled files under ./infrastructure/minio/seed-images/
    # (mounted at /seed-images) and only falls back to the URL list in the
    # manifest when no local file is present.
    #
    # We use a custom image (Alpine + mc + standard shell utilities) because
    # the upstream `minio/mc` image ships from `scratch` and has no `grep`,
    # `sed`, `wget`, etc. The Dockerfile and seed.sh are kept separate so
    # editing seed.sh does not require a rebuild.
    build:
      context: ./infrastructure/minio
      dockerfile: Dockerfile
    depends_on:
      minio:
        condition: service_healthy
    volumes:
      - ./infrastructure/minio/seed.sh:/seed.sh:ro
      - ./infrastructure/minio/seed-manifest.json:/seed-manifest.json:ro
      - ./infrastructure/minio/seed-images:/seed-images:ro
    restart: "no"

  mysql:
    image: mysql:8
    ports:
      - "3306:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=root_pass
      - MYSQL_DATABASE=aether_motors
      - MYSQL_USER=aether
      - MYSQL_PASSWORD=aether_pass
    volumes:
      - mysql_data:/var/lib/mysql
      - ./services/product-service/aether_motors.sql:/docker-entrypoint-initdb.d/01-aether_motors.sql:ro

  mysql-orders:
    image: mysql:8
    ports:
      - "3307:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=root_pass
      - MYSQL_DATABASE=aether_orders
      - MYSQL_USER=aether
      - MYSQL_PASSWORD=aether_pass
    volumes:
      - mysql_orders_data:/var/lib/mysql
      - ./services/order-service/orders.sql:/docker-entrypoint-initdb.d/01-orders.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot_pass"]
      interval: 5s
      timeout: 3s
      retries: 10

  adminer:
    image: adminer:latest
    ports:
      - "8080:8080"
    depends_on:
      - mysql
      - mysql-orders

volumes:
  mysql_data:
  mysql_orders_data:
  redis_data:
  minio_data:
